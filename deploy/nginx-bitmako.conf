# Reverse proxy for the BitMako demo. Replace DEMO_DOMAIN with your actual
# subdomain (e.g. demo.example.com) before use.
#
# Install: sudo cp nginx-bitmako.conf /etc/nginx/sites-available/bitmako-demo
#          sudo ln -s /etc/nginx/sites-available/bitmako-demo /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Then run `sudo certbot --nginx -d DEMO_DOMAIN` to fit TLS onto this config
# automatically (certbot rewrites this file to add the 443 server block).

server {
    listen 80;
    listen [::]:80;
    server_name DEMO_DOMAIN;

    # A couple of layers of request-size/rate sanity beyond BitMako's own
    # in-process rate limiter (src/api.rs) — belt and suspenders in front of
    # a publicly reachable process.
    client_max_body_size 8k;
    limit_req_zone $binary_remote_addr zone=bitmako_demo:10m rate=10r/s;
    limit_req zone=bitmako_demo burst=20 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
